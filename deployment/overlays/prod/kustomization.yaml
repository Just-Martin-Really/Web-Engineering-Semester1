# yaml-language-server: $schema=https://json.schemastore.org/kustomization.json
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  # Static input provider that drives the app-image OCIArtifactTag filter for
  # prod: floats on the highest `-prod` tag (`floating: true`), see file header.
  - app-image-config.yaml

# Tag scheme: no `v` prefix, matching what CI publishes (the package.json
# version, e.g. `1.0.0`). Image promotion to prod adds the env-suffix tag
# (`1.0.0` -> `1.0.0-prod`) via the Promote Image workflow; the provider floats
# onto it. This is the single SemVer scheme the OCIArtifactTag provider requires.
