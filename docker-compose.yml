services:
  # PostgreSQL Database - start first
  postgres:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kursforum
      POSTGRES_USER: kursforum
      POSTGRES_PASSWORD: kursforum_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kursforum -d kursforum"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Application
  app:
    build:
      context: .
      dockerfile: dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      # Database
      - DATABASE_URL=postgresql://kursforum:kursforum_dev_password@postgres:5432/kursforum
      # Environment Mode
      - NODE_ENV=development
      # JWT Token Secrets
      - ACCESS_TOKEN_SECRET=docker-dev-access-secret-change-in-production-12345
      - REFRESH_TOKEN_SECRET=docker-dev-refresh-secret-change-in-production-12345
      - SESSION_SECRET=docker-dev-session-secret-change-in-production-12345
      # Token Expiry
      - ACCESS_TOKEN_EXPIRY=15m
      - REFRESH_TOKEN_EXPIRY=7d
      # Logging
      - LOG_LEVEL=info
      # CORS
      - ALLOWED_ORIGINS=http://localhost,http://localhost:3001,http://localhost:80
      # Security
      - ENFORCE_HTTPS=false
      # Port
      - PORT=3001
      # Demo data
      - SEED_TOPICS=true
      - SEED_TOPICS_ON_EMPTY_ONLY=false
      - SEED_TOPICS_FILE=/app/seeds/topics.seed.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
