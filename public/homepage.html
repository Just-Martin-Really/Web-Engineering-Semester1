<!DOCTYPE html>

<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kursforum</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
<div class="login-box">
    <form action="/login" method="post">
        <fieldset>
            <legend>Login</legend>
            <label for="textLoginBenutzerName">Benutzername</label>
            <input
                    type="text"
                    name="loginBenutzername"
                    id="textLoginBenutzerName"
                    class="inputField"
                    placeholder="Benutzername"
                    required>
            <label for="textLoginBenutzerPasswort">Passwort</label>
            <input
                    type="password"
                    name="loginPasswort"
                    id="textLoginBenutzerPasswort"
                    class="inputField"
                    placeholder="Passwort"
                    required>
            <button type="submit"
                    id="buttonLogin"
                    class="buttonLogin">
                Anmelden
            </button>
        </fieldset>
    </form>
</div>
<p></p>
<p></p>
<div class="registration-box">
    <form action="/register" method="post">
        <fieldset>
            <legend>Registrieren</legend>
            <label for="textRegBenutzerVorname">Vorname</label>
            <input
                    type="text"
                    name="regVorname"
                    id="textRegBenutzerVorname"
                    class="inputField"
                    placeholder="Vorname"
                    required>
            <label for="textRegBenutzerNachname">Nachname</label>
            <input
                    type="text"
                    name="regNachname"
                    id="textRegBenutzerNachname"
                    class="inputField"
                    placeholder="Nachname"
                    required>
            <label for="textRegBenutzerName">Benutzername</label>
            <input
                    type="text"
                    name="regBenutzername"
                    id="textRegBenutzerName"
                    class="inputField"
                    placeholder="Benutzername"
                    required>
            <label for="textRegBenutzerPasswort">Passwort</label>
            <input
                    type="password"
                    name="regPasswort"
                    id="textRegBenutzerPasswort"
                    class="inputField"
                    placeholder="Passwort"
                    required>
            <label for="textRegBenutzerKurs">Kurs</label>
            <input
                    type="text"
                    name="regKurs"
                    id="textRegBenutzerKurs"
                    class="inputField"
                    placeholder="Kurs"
                    required>
            <button type="submit"
                    id="buttonRegReg"
                    class="buttonRegReg">
                Registrieren
            </button>
        </fieldset>
    </form>
</div>
</body>
</html>
